
# Path to the folder containing the original training data
datapath: elope_data/train

# Path to the folder in which to store the cached dataset model
output_path: dataset/
# Name prefix of the dataset
output_name: dataset-5s-stamp

# If true, once the dataset has been loaded, it will be saved to the output directory 
# written above
save_cache: True

# If true, the program will first look for a dataset file in the output directory
use_cached: True

# True if the dataset should be expanded by including flipped trajectory samples (i.e., the 
# lander motion is reversed.)
flip: True

# Sampling interval along the trajectory. It determines how many state points are 
# retrieved from that trajectory. 
sample_interval: 1

# Length of the IMU sequence
imu_sequence_length: 5

# Set the type of IMU padding. Support values are "copy", "static". 
# - copy simply fills unavailable states with a copy of the first available data. 
# - static copies position/range/angles but sets velocity and angular velocity to zero.
imu_padding: static

events: 
  
  # Horizontal dimension of the image, in pixels.
  width: 200
  # Vertical dimension of the image, in pixels.
  height: 200
  # Dimension for the event tensor (i.e., number of time bins)
  channels: 1 

  # Type of event encoding, either "count" or "last_timestamp"
  encoder_method: last_timestamp 

  # Duration of the window in which events are integrated, in microseconds
  integration_window: 1e5

  # Type of normalisation for the event tensor.
  # Supported values are "minmax", "standard" or "null"
  normalization: "null"