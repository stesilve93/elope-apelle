
weights: 

  # Path to the folder in which to store the sample weights
  path: weights

  # Name of the model
  name: elope-emmnet-v3

  # Specify every how many epochs the model weights should be saved.
  checkpoint_epochs: 10

# Set the type of IMU padding. Support values are "copy", "static". 
# - copy simply fills unavailable states with a copy of the first available data. 
# - static copies position/range/angles but sets velocity and angular velocity to zero.
padding: static 

# Length of the IMU sequence
sequence_length: 5

# Type of output, either "initial_state", "final_state", "central_state" or "sequence".
output_type: final_state

# Type of normalization for the event tensor. Supported values are "null", "standard", 
# or "minmax".
event_normalization: "null"

# Dropout fraction for the model
dropout: 0.05

# Network architecture 
architecture: 

  # Type of ResNet model used in the event encoder.
  resnet_model: resnet-18 

  # Hidden dimensions for the range embedding
  range_channels: [32, 8]

  # Hidden dimensions for the IMU embedder
  imu_channels: [64, 64, 32]

# Training losses settings
losses:

  # Weight for the loss using absolute MSE
  lmb_mse_abs: 0.0 

  # Weight for the loss using relative MSE
  lmb_mse_rel: 0.0 

  # Weight for the ELOPE loss
  lmb_elope: 1.0