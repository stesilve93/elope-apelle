
weights: 

  # Path to the folder in which to store the sample weights
  path: weights

  # Name of the model
  name: emmnet-angles-of

  # Specify every how many epochs the model weights should be saved.
  checkpoint_epochs: 10

# Type of network model 
model: emmnet-angles-of

# Set the type of IMU padding. Support values are "copy", "static". 
# - copy simply fills unavailable states with a copy of the first available data. 
# - static copies position/range/angles but sets velocity and angular velocity to zero.
padding: static 

# Length of the states sequence
sequence_length: 3

# Sampling interval along the trajectory. It determines how many state points are 
# retrieved from that trajectory. 
sample_interval: 1

# Type of normalization for the event tensor. Supported values are "null", "standard", 
# or "minmax".
event_normalization: "null"

# Eventually reduce the event integration window w.r.t. the original input. This is valid 
# only when the dataset is set to "last_timestamp".
event_integration_window: 3e5

# Dropout fraction for the model
dropout: 0.15

# Type of output, either "initial_state", "final_state", "central_state" or "sequence".
output_type: final_state

channels_angle: [16, 32, 64]
channels_omega: [16, 32, 64]
channels_range: [8, 16, 32]

# Self-supervised event flow auxiliary task 
# (it needs to have a model supporting optical flow head)
flow_aux: true
flow_height: 200
flow_width: 200
flow_from_events: true
aux_flow_weight: 0.1
aux_flow_smooth_weight: 0.1

# Training losses settings
losses:

  # Weight for the loss using absolute MSE
  lmb_mse_abs: 0.0

  # Weight for the loss using relative MSE
  lmb_mse_rel: 0.0 

  # Weight for the ELOPE loss
  lmb_elope: 1.0
